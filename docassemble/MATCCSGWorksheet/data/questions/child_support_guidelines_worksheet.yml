# ---------------------------------------------------------------------------
# TABLE B: Adjustment for number of children (multiplier applied to the
# 1-child amount from Table A to get the combined support amount).
# ---------------------------------------------------------------------------
code: |
  table_b_schedule = {0: 0.00, 1: 1.00, 2: 1.40, 3: 1.68, 4: 1.85, 5: 1.94}
  def lookup_table_b(num_children):
    n = int(num_children)
    if n > 5:
      n = 5
    if n < 0:
      n = 0
    return table_b_schedule[n]
---
# ---------------------------------------------------------------------------
# TABLE C: Adjustment percentage for children 18 years or older. Rows = number
# of children under 18, columns = number of children 18 or older. Capped by
# the worksheet's "Maximum of 5 children" rule (row + col <= 5). If there are
# 0 children 18 or older, the adjustment is 0% (no row/column needed).
# ---------------------------------------------------------------------------
code: |
  table_c_schedule = {
    0: {1: 0.25, 2: 0.25, 3: 0.25, 4: 0.25, 5: 0.25},
    1: {1: 0.07, 2: 0.11, 3: 0.13, 4: 0.14},
    2: {1: 0.04, 2: 0.06, 3: 0.07},
    3: {1: 0.02, 2: 0.03},
    4: {1: 0.01},
    5: {},
  }
  def lookup_table_c(under_18, over_18):
    if int(over_18) <= 0:
      return 0.00
    row = table_c_schedule.get(int(under_18), {})
    return row.get(int(over_18), 0.00)
