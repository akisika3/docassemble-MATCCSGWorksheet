---
include:
  - docassemble.AssemblyLine:assembly_line.yml
---
metadata:
  title: |
    Massachusetts Child Support Guidelines Worksheet (CJD 304)
  short title: |
    Child Support Worksheet
  description: |
    Generates a filled-in 2025 Massachusetts Child Support Guidelines Worksheet (CJD 304)
    by collecting the inputs needed for Sections 1-8 and performing the worksheet's
    calculations (Tables A, B, and C).
  authors:
    - name: Suffolk LIT Lab AssemblyLine
      organization: Massachusetts Court System Forms Project
  revision_date: 2026-06-16
  jurisdiction: Massachusetts
  id: ma child support guidelines worksheet
---
objects:
  - users: ALPeopleList.using(ask_number=False, target_number=1)
  - other_parties: ALPeopleList.using(ask_number=False, target_number=1)
---
code: |
  github_repo_name = 'docassemble-MATCCSGWorksheet'
---
code: |
  al_form_type = "other_form"
---
code: |
  AL_DEFAULT_COUNTRY = "US"
---
code: |
  AL_DEFAULT_STATE = "MA"
---
objects:
  - ma_child_support_guidelines_worksheet_attachment: ALDocument.using(title="Child Support Guidelines Worksheet", filename="MA_Child_Support_Worksheet", enabled=True, has_addendum=False)
---
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[ma_child_support_guidelines_worksheet_attachment], filename="MA_Child_Support_Worksheet", title="All forms to download for your records", enabled=True)
  - al_recipient_bundle: ALDocumentBundle.using(elements=[ma_child_support_guidelines_worksheet_attachment], filename="MA_Child_Support_Worksheet", title="All forms to file", enabled=True)
---
features:
  navigation: True
  question back button: True
  progress bar: True
---
sections:
  - intro: Getting started
  - parties: Parents and children
  - income: Income, benefits, and deductions
  - childcare: Child care costs
  - review: Review and download
---
initial: True
code: |
  al_nav_sections = [
    {"intro": "Getting started"},
    {"parties": "Parents and children"},
    {"income": "Income and deductions"},
    {"childcare": "Child care"},
    {"review": "Review and download"},
  ]
---
id: interview_order_ma_child_support_guidelines_worksheet
code: |
  case_name
  docket_number
  signature_date
  preparer_name
  parenting_box
  users[0].name.first
  other_parties[0].name.first
  child_count_inputs_complete
  users[0].gross_weekly_income_amount
  other_parties[0].gross_weekly_income_amount
  social_security_dependency_benefits_yes
  deductions_complete
  child_care_grid_complete
  calculations_complete
  interview_order_ma_child_support_guidelines_worksheet = True
---
mandatory: True
comment: |
  This block controls the top-level interview flow.
  Delete mandatory: True to embed this interview inside another.
code: |
  al_intro_screen
  ma_child_support_guidelines_worksheet_intro
  interview_order_ma_child_support_guidelines_worksheet
  store_variables_snapshot(
      persistent=True,
      data={
          "zip": showifdef("users[0].address.zip"),
          "reached_interview_end": True,
      },
  )
  ma_child_support_guidelines_worksheet_download
---
id: ma child support guidelines worksheet
continue button field: ma_child_support_guidelines_worksheet_intro
section: intro
question: |
  Fill out the Child Support Guidelines Worksheet
subquestion: |
  This interview asks the same questions as the Massachusetts Child Support
  Guidelines Worksheet (CJD 304). It fills in a copy of the form for you
  and does the math in Sections 3–8 automatically.
---
id: case information
section: intro
question: |
  Case information
fields:
  - Case name: case_name
  - Docket number (optional): docket_number
    required: False
  - Today's date: signature_date
    datatype: date
  - Preparer's name: preparer_name
sets:
  - case_name
  - docket_number
  - signature_date
  - preparer_name
---
id: parenting arrangement
section: parties
question: |
  What is the parenting arrangement?
subquestion: |
  Choose the option that best describes your situation.
field: parenting_box
datatype: radio
choices:
  - "The children spend approximately equal time living with both parents": "1"
  - "The children live mainly with one parent (about two-thirds of the time)": "2"
  - "There are multiple children and each parent is the primary home for at least one child": "3"
---
code: |
  parenting_arrangement_shared = parenting_box == "1"
  parenting_arrangement_primary = parenting_box == "2"
  parenting_arrangement_split = parenting_box == "3"
---
id: parents names
section: parties
question: |
  What are the parents' names?
fields:
  - First parent's full name: users[0].name.first
  - Second parent's full name: other_parties[0].name.first
note: |
  % if parenting_arrangement_primary:
  Since the children live mainly with one parent, that parent should be first.
  % endif
---
id: shared child count
section: parties
question: |
  How many children are covered by this order?
subquestion: |
  The same numbers apply to both parents.
fields:
  - Children under age 18: shared_children_under_18
    datatype: integer
    min: 0
    max: 5
  - Children age 18 or older: shared_children_18_or_older
    datatype: integer
    min: 0
    max: 5
show if:
  variable: parenting_box
  is: "1"
---
id: primary child count
section: parties
question: |
  How many children primarily reside with the first parent?
subquestion: |
  These numbers are for the parent with whom the children mainly live.
  The other parent's totals will be 0.
fields:
  - Children under age 18: shared_children_under_18
    datatype: integer
    min: 0
    max: 5
  - Children age 18 or older: shared_children_18_or_older
    datatype: integer
    min: 0
    max: 5
show if:
  variable: parenting_box
  is: "2"
---
id: split child count
section: parties
question: |
  How many children mainly live with each parent?
fields:
  - ${ users[0].name.first }'s children under age 18: users[0].children_under_18_count
    datatype: integer
    min: 0
    max: 5
  - ${ users[0].name.first }'s children age 18 or older: users[0].children_18_or_older_count
    datatype: integer
    min: 0
    max: 5
  - ${ other_parties[0].name.first }'s children under age 18: other_parties[0].children_under_18_count
    datatype: integer
    min: 0
    max: 5
  - ${ other_parties[0].name.first }'s children age 18 or older: other_parties[0].children_18_or_older_count
    datatype: integer
    min: 0
    max: 5
show if:
  variable: parenting_box
  is: "3"
---
code: |
  if parenting_arrangement_shared:
    users[0].children_under_18_count = shared_children_under_18
    users[0].children_18_or_older_count = shared_children_18_or_older
    other_parties[0].children_under_18_count = shared_children_under_18
    other_parties[0].children_18_or_older_count = shared_children_18_or_older
  elif parenting_arrangement_primary:
    users[0].children_under_18_count = shared_children_under_18
    users[0].children_18_or_older_count = shared_children_18_or_older
    other_parties[0].children_under_18_count = 0
    other_parties[0].children_18_or_older_count = 0
  # Box 3 (split): users[0] and other_parties[0] counts are asked directly above.
  users[0].total_children_count = users[0].children_under_18_count + users[0].children_18_or_older_count
  other_parties[0].total_children_count = other_parties[0].children_under_18_count + other_parties[0].children_18_or_older_count
  if parenting_arrangement_split:
    total_children_under_18 = users[0].children_under_18_count + other_parties[0].children_under_18_count
    total_children_18_or_older = users[0].children_18_or_older_count + other_parties[0].children_18_or_older_count
  else:
    total_children_under_18 = users[0].children_under_18_count
    total_children_18_or_older = users[0].children_18_or_older_count
  number_of_children_eligible = total_children_under_18 + total_children_18_or_older
  child_count_inputs_complete = True
---
id: gross weekly income
section: income
question: |
  What is each parent's gross weekly income?
fields:
  - ${ users[0].name.first }'s gross weekly income: users[0].gross_weekly_income_amount
    datatype: currency
    min: 0
  - ${ other_parties[0].name.first }'s gross weekly income: other_parties[0].gross_weekly_income_amount
    datatype: currency
    min: 0
---
id: social security dependency benefits
section: income
question: |
  Do any children receive Social Security dependency benefits?
subquestion: |
  ${ collapse_template(dependency_benefit_explanation) }
field: social_security_dependency_benefits_yes
datatype: yesnoradio
---
template: dependency_benefit_explanation
subject: |
  What is a dependency benefit?
content: |
  A dependency benefit is a payment a child gets from Social Security
  because a parent is retired or has a disability.
---
code: |
  social_security_dependency_benefits_no = not social_security_dependency_benefits_yes
---
id: social security dependency benefit details
section: income
question: |
  What are the Social Security dependency benefit details?
fields:
  - Which parent's retirement or disability are the benefits based on?: dependency_benefit_based_on
    datatype: radio
    choices:
      - ${ users[0].name.first }: user
      - ${ other_parties[0].name.first }: other_party
  - Weekly amount ${ users[0].name.first } actually receives: users[0].social_security_dependency_benefit_amount
    datatype: currency
    min: 0
  - Weekly amount ${ other_parties[0].name.first } actually receives: other_parties[0].social_security_dependency_benefit_amount
    datatype: currency
    min: 0
show if:
  variable: social_security_dependency_benefits_yes
  is: True
---
code: |
  if not social_security_dependency_benefits_yes:
    users[0].social_security_dependency_benefit_amount = 0
    other_parties[0].social_security_dependency_benefit_amount = 0
    dependency_benefit_based_on = None
  dependency_benefit_based_on_user = dependency_benefit_based_on == "user"
  dependency_benefit_based_on_other_party = dependency_benefit_based_on == "other_party"
  # 2c: total of all amounts in 2b, entered in the column of the retired/disabled parent
  users[0].total_dependency_benefit_amount = (
    users[0].social_security_dependency_benefit_amount + other_parties[0].social_security_dependency_benefit_amount
  ) if dependency_benefit_based_on_user else 0
  other_parties[0].total_dependency_benefit_amount = (
    users[0].social_security_dependency_benefit_amount + other_parties[0].social_security_dependency_benefit_amount
  ) if dependency_benefit_based_on_other_party else 0
---
id: deductions
section: income
question: |
  What are each parent's deductions?
subquestion: |
  Weekly amounts for each deduction. Use $0 if a deduction does not apply.
fields:
  - ${ users[0].name.first }'s other support obligations paid each week: users[0].other_support_paid_amount
    datatype: currency
    min: 0
    default: 0
  - ${ other_parties[0].name.first }'s other support obligations paid each week: other_parties[0].other_support_paid_amount
    datatype: currency
    min: 0
    default: 0
  - ${ users[0].name.first }'s health care premium or enrollment paid each week: users[0].health_care_premium_amount
    datatype: currency
    min: 0
    default: 0
  - ${ other_parties[0].name.first }'s health care premium or enrollment paid each week: other_parties[0].health_care_premium_amount
    datatype: currency
    min: 0
    default: 0
  - ${ users[0].name.first }'s dental or vision insurance paid each week: users[0].dental_vision_insurance_amount
    datatype: currency
    min: 0
    default: 0
  - ${ other_parties[0].name.first }'s dental or vision insurance paid each week: other_parties[0].dental_vision_insurance_amount
    datatype: currency
    min: 0
    default: 0
---
code: |
  deductions_complete = True
---
id: child care costs
section: childcare
question: |
  What are each parent's child care costs?
subquestion: |
  For each child, the weekly amount each parent pays for child care.
  Use $0 if there are no costs.
fields:
  - Child 1 — ${ users[0].name.first }'s weekly cost: child1_care_paid_by_user_amount
    datatype: currency
    min: 0
    default: 0
  - Child 1 — ${ other_parties[0].name.first }'s weekly cost: child1_care_paid_by_other_party_amount
    datatype: currency
    min: 0
    default: 0
  - Child 2 — ${ users[0].name.first }'s weekly cost: child2_care_paid_by_user_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 2
  - Child 2 — ${ other_parties[0].name.first }'s weekly cost: child2_care_paid_by_other_party_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 2
  - Child 3 — ${ users[0].name.first }'s weekly cost: child3_care_paid_by_user_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 3
  - Child 3 — ${ other_parties[0].name.first }'s weekly cost: child3_care_paid_by_other_party_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 3
  - Child 4 — ${ users[0].name.first }'s weekly cost: child4_care_paid_by_user_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 4
  - Child 4 — ${ other_parties[0].name.first }'s weekly cost: child4_care_paid_by_other_party_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 4
  - Child 5 — ${ users[0].name.first }'s weekly cost: child5_care_paid_by_user_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 5
  - Child 5 — ${ other_parties[0].name.first }'s weekly cost: child5_care_paid_by_other_party_amount
    datatype: currency
    min: 0
    default: 0
    required: False
    show if:
      code: |
        number_of_children_eligible >= 5
---
code: |
  if number_of_children_eligible < 2:
    child2_care_paid_by_user_amount = 0
    child2_care_paid_by_other_party_amount = 0
  if number_of_children_eligible < 3:
    child3_care_paid_by_user_amount = 0
    child3_care_paid_by_other_party_amount = 0
  if number_of_children_eligible < 4:
    child4_care_paid_by_user_amount = 0
    child4_care_paid_by_other_party_amount = 0
  if number_of_children_eligible < 5:
    child5_care_paid_by_user_amount = 0
    child5_care_paid_by_other_party_amount = 0
  child_care_amounts_by_child = [
    (child1_care_paid_by_user_amount, child1_care_paid_by_other_party_amount),
    (child2_care_paid_by_user_amount, child2_care_paid_by_other_party_amount),
    (child3_care_paid_by_user_amount, child3_care_paid_by_other_party_amount),
    (child4_care_paid_by_user_amount, child4_care_paid_by_other_party_amount),
    (child5_care_paid_by_user_amount, child5_care_paid_by_other_party_amount),
  ]
  child1_care_total_amount = child1_care_paid_by_user_amount + child1_care_paid_by_other_party_amount
  child2_care_total_amount = child2_care_paid_by_user_amount + child2_care_paid_by_other_party_amount
  child3_care_total_amount = child3_care_paid_by_user_amount + child3_care_paid_by_other_party_amount
  child4_care_total_amount = child4_care_paid_by_user_amount + child4_care_paid_by_other_party_amount
  child5_care_total_amount = child5_care_paid_by_user_amount + child5_care_paid_by_other_party_amount
  users[0].total_child_care_amount = (
    child1_care_paid_by_user_amount + child2_care_paid_by_user_amount + child3_care_paid_by_user_amount
    + child4_care_paid_by_user_amount + child5_care_paid_by_user_amount
  )
  other_parties[0].total_child_care_amount = (
    child1_care_paid_by_other_party_amount + child2_care_paid_by_other_party_amount + child3_care_paid_by_other_party_amount
    + child4_care_paid_by_other_party_amount + child5_care_paid_by_other_party_amount
  )
  child_care_grid_complete = True
---
# ---------------------------------------------------------------------------
# Formatting helpers. The worksheet says: "Round all numbers to the nearest
# whole dollar or percentage." No $ or % characters are embedded here because
# those symbols are already printed as static text on the form next to each
# box.
# ---------------------------------------------------------------------------
code: |
  def percentage(x):
    # x is expected as a fraction (0.0-1.0+); display as a whole percentage
    try:
      return str(int(round(float(x) * 100)))
    except (TypeError, ValueError):
      return "0"
---
