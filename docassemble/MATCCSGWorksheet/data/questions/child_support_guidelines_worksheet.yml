  **You need to do one more step by hand.** This worksheet includes a
  Social Security dependency benefit in the recipient's income (Section 2c),
  and the parents have shared or split parenting. The guidelines require a
  second worksheet in this situation. For that second worksheet, use the
  amount from Section 2b instead of Section 2c for the recipient parent.
  The final support obligation shown above may change after you complete
  that second worksheet.

  % endif
  ${ action_button_html(url_action('review_ma_child_support_guidelines_worksheet'), label='Edit answers', color='info') }

