# ---------------------------------------------------------------------------
# SECTION 4: Adjustment for children 18 years or older
#
# Note on form layout: the printed worksheet shows 4a-4c in both the Parent A
# and Parent B columns, but the underlying calculation is a single, combined
# value (it adjusts 3g, which is a single combined number). This interview
# computes one combined value and writes it into both columns' fields, which
# matches the form's own duplicated display.
# ---------------------------------------------------------------------------
code: |
  age_adjustment_percentage = lookup_table_c(total_children_under_18, total_children_18_or_older)
  age_adjustment_amount = combined_support_amount * age_adjustment_percentage
  adjusted_combined_support_amount = combined_support_amount - age_adjustment_amount
---
# ---------------------------------------------------------------------------
# SECTION 5: Proportional support amounts
# ---------------------------------------------------------------------------
code: |
  # 5a. Each parent's share of support = 3c x 4c
  users[0].share_of_support_amount = users[0].combined_income_share_percentage * adjusted_combined_support_amount
  other_parties[0].share_of_support_amount = other_parties[0].combined_income_share_percentage * adjusted_combined_support_amount
  # 5b. Other parent's share of support = 4c - 5a (in each parent's own column,
  # this is the OTHER parent's 5a amount)
  users[0].other_parent_share_amount = adjusted_combined_support_amount - users[0].share_of_support_amount
  other_parties[0].other_parent_share_amount = adjusted_combined_support_amount - other_parties[0].share_of_support_amount
  # 5c. Other parent's share of support with low-income payor adjustment
  if parenting_arrangement_primary:
    # Box 2: Parent B (other_parties[0]) gets $0; for Parent A, apply the
    # low-income test using Parent B's own available income (3a).
    other_parties[0].low_income_adjusted_support_amount = 0
    if other_parties[0].available_income_amount > 391:
      users[0].low_income_adjusted_support_amount = users[0].other_parent_share_amount
    else:
      users[0].low_income_adjusted_support_amount = lookup_table_a(other_parties[0].available_income_amount)
  else:
    # Box 1 or Box 3: test each parent's own available income against $391;
    # if at/below it, substitute the shaded Guidelines Chart amount for that
    # parent's own available income.
    if other_parties[0].available_income_amount > 391:
      users[0].low_income_adjusted_support_amount = users[0].other_parent_share_amount
    else:
      users[0].low_income_adjusted_support_amount = lookup_table_a(other_parties[0].available_income_amount)
    if users[0].available_income_amount > 391:
      other_parties[0].low_income_adjusted_support_amount = other_parties[0].other_parent_share_amount
    else:
      other_parties[0].low_income_adjusted_support_amount = lookup_table_a(users[0].available_income_amount)
