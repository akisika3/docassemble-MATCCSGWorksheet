# ---------------------------------------------------------------------------
# SECTION 6: Adjusted support amounts
# ---------------------------------------------------------------------------
code: |
  # 6a. Child care cost benchmark amount, per child, then summed
  CHILDCARE_BENCHMARK = 430
  users_benchmark_total = 0
  other_benchmark_total = 0
  for paid_by_user, paid_by_other in child_care_amounts_by_child:
    total_for_child = paid_by_user + paid_by_other
    if total_for_child <= 0:
      continue
    if total_for_child <= CHILDCARE_BENCHMARK:
      users_benchmark_total += paid_by_user
      other_benchmark_total += paid_by_other
    else:
      factor = CHILDCARE_BENCHMARK / total_for_child
      users_benchmark_total += paid_by_user * factor
      other_benchmark_total += paid_by_other * factor
  users[0].benchmark_child_care_amount = users_benchmark_total
  other_parties[0].benchmark_child_care_amount = other_benchmark_total
  # 6b. Other parent's share of benchmark cost
  users[0].benchmark_share_amount = other_parties[0].combined_income_share_percentage * users[0].benchmark_child_care_amount
  other_parties[0].benchmark_share_amount = users[0].combined_income_share_percentage * other_parties[0].benchmark_child_care_amount
  # 6c. Other parent's adjusted share of support = 5c + 6b
  users[0].adjusted_support_amount = users[0].low_income_adjusted_support_amount + users[0].benchmark_share_amount
  other_parties[0].adjusted_support_amount = other_parties[0].low_income_adjusted_support_amount + other_parties[0].benchmark_share_amount
  # 6d. Support as % of each parent's available income
  if parenting_arrangement_primary:
    users[0].support_percentage_display = "N/A"
    other_parties[0].support_percentage_display = "N/A"
    users[0].support_percentage = None
    other_parties[0].support_percentage = None
  else:
    if users[0].available_income_amount == 0:
      users[0].support_percentage = 1.0
    else:
      users[0].support_percentage = users[0].adjusted_support_amount / users[0].available_income_amount
    if other_parties[0].available_income_amount == 0:
      other_parties[0].support_percentage = 1.0
    else:
      other_parties[0].support_percentage = other_parties[0].adjusted_support_amount / other_parties[0].available_income_amount
    users[0].support_percentage_display = percentage(users[0].support_percentage)
    other_parties[0].support_percentage_display = percentage(other_parties[0].support_percentage)
  # 6e. Other parent's adjusted share of support
  def section_6e(party, other_party):
    pct_is_low = (party.support_percentage is not None) and (party.support_percentage < 0.10)
    if not pct_is_low:
      return party.adjusted_support_amount
    candidate = min(party.adjusted_support_amount, (party.support_percentage + 0.10) * other_party.available_income_amount)
    floor_amount = lookup_table_a(other_party.available_income_amount)
    return max(candidate, floor_amount)
  users[0].final_adjusted_support_amount = section_6e(users[0], other_parties[0])
  other_parties[0].final_adjusted_support_amount = section_6e(other_parties[0], users[0])
  # 6f. Recipient and Payor
  if parenting_arrangement_primary:
    users[0].recipient_or_payor = "Recipient"
    other_parties[0].recipient_or_payor = "Payor"
  else:
    if users[0].adjusted_support_amount == other_parties[0].adjusted_support_amount:
      users[0].recipient_or_payor = "Recipient"
      other_parties[0].recipient_or_payor = "Payor"
    elif users[0].final_adjusted_support_amount > other_parties[0].final_adjusted_support_amount:
      users[0].recipient_or_payor = "Recipient"
      other_parties[0].recipient_or_payor = "Payor"
    else:
      users[0].recipient_or_payor = "Payor"
      other_parties[0].recipient_or_payor = "Recipient"
  if users[0].recipient_or_payor == "Recipient":
    recipient, payor = users[0], other_parties[0]
  else:
    recipient, payor = other_parties[0], users[0]
  # 6g. Payor's adjusted share of support = Recipient 6e - Payor 6e, not less than $0
  payor_adjusted_support_amount = max(0, recipient.final_adjusted_support_amount - payor.final_adjusted_support_amount)
  # Flag (not auto-calculated) per the worksheet's own hand-calculation note:
  # if Box 1 or Box 3, and there is a dependency benefit in the Recipient's 2c,
  # a second worksheet must be hand-run substituting 2b for 2c in that column.
  dependency_benefit_recalculation_flag = (
    (not parenting_arrangement_primary) and recipient.total_dependency_benefit_amount > 0
  )
---
# ---------------------------------------------------------------------------
# SECTION 7: Payor's net support obligation
# ---------------------------------------------------------------------------
code: |
  # 7a. Support as % of Recipient's available income
  if not parenting_arrangement_primary:
    support_percentage_of_recipient_income_display = "N/A"
    support_percentage_of_recipient_income = None
  else:
    if recipient.available_income_amount == 0:
      support_percentage_of_recipient_income = 1.0
    else:
      support_percentage_of_recipient_income = payor_adjusted_support_amount / recipient.available_income_amount
    support_percentage_of_recipient_income_display = percentage(support_percentage_of_recipient_income)
  # 7b. Payor's support obligation adjusted for income disparity
  pct_is_low_7 = (support_percentage_of_recipient_income is not None) and (support_percentage_of_recipient_income < 0.10)
  if not pct_is_low_7:
    adjusted_payor_support_amount = payor_adjusted_support_amount
  else:
    candidate_7b = min(payor.final_adjusted_support_amount, payor_adjusted_support_amount, (support_percentage_of_recipient_income + 0.10) * payor.available_income_amount)
    floor_7b = lookup_table_a(payor.available_income_amount)
    adjusted_payor_support_amount = max(candidate_7b, floor_7b)
  # 7c. Credit for Social Security dependency benefits paid directly to the Recipient
  social_security_credit_amount = recipient.social_security_dependency_benefit_amount if recipient.total_dependency_benefit_amount > 0 else 0
  # 7d. Payor's final support obligation
  if adjusted_payor_support_amount > social_security_credit_amount:
    payor_final_support_obligation_amount = adjusted_payor_support_amount - social_security_credit_amount
  else:
    payor_final_support_obligation_amount = 0
  # 7e. Support as % of Payor's available income
  if payor.available_income_amount == 0:
    payor_support_percentage = 1.0
  else:
    payor_support_percentage = payor_final_support_obligation_amount / payor.available_income_amount
  substantial_hardship_deviation = payor_support_percentage >= 0.40
---
# ---------------------------------------------------------------------------
# SECTION 8: Additional income above $8,654
# ---------------------------------------------------------------------------
code: |
  has_additional_available_income = combined_available_income_amount > 8654
  additional_available_income_amount = max(0, combined_available_income_amount - 8654)
  users[0].additional_income_share_amount = additional_available_income_amount * users[0].combined_income_share_percentage
  other_parties[0].additional_income_share_amount = additional_available_income_amount * other_parties[0].combined_income_share_percentage
  _ = percentage  # ensure percentage() is in namespace before template renders
  _ = payor_final_support_obligation_amount  # cascade-trigger Sections 4-7
  calculations_complete = True
---
