  def lookup_table_a(income):
    income = max(0, float(income))
    if income > 8654:
      income = 8654
    amount = table_a_schedule[0][1]
    for threshold, value in table_a_schedule:
      if threshold <= income:
        amount = value
      else:
        break
    return amount
