# ---------------------------------------------------------------------------
# SECTION 3: Gross support amounts
# ---------------------------------------------------------------------------
code: |
  # 3a. Available income = 2a + 2c - 2d - 2e - 2f, but not less than $0
  users[0].available_income_amount = max(0, (
    users[0].gross_weekly_income_amount + users[0].total_dependency_benefit_amount
    - users[0].other_support_paid_amount - users[0].health_care_premium_amount
    - users[0].dental_vision_insurance_amount
  ))
  other_parties[0].available_income_amount = max(0, (
    other_parties[0].gross_weekly_income_amount + other_parties[0].total_dependency_benefit_amount
    - other_parties[0].other_support_paid_amount - other_parties[0].health_care_premium_amount
    - other_parties[0].dental_vision_insurance_amount
  ))
  # 3b. Combined available income
  combined_available_income_amount = users[0].available_income_amount + other_parties[0].available_income_amount
  # 3c. Share of combined available income (Min 0%, Max 100%)
  if combined_available_income_amount > 0:
    users[0].combined_income_share_percentage = min(1.0, max(0.0, users[0].available_income_amount / combined_available_income_amount))
    other_parties[0].combined_income_share_percentage = min(1.0, max(0.0, other_parties[0].available_income_amount / combined_available_income_amount))
  else:
    users[0].combined_income_share_percentage = 0.0
    other_parties[0].combined_income_share_percentage = 0.0
  # 3d. Applicable available income: 3b or $8,654, whichever is less
  applicable_available_income_amount = min(combined_available_income_amount, 8654)
  # 3e. Support amount for one child, from Table A / Guidelines Chart
  one_child_support_amount = lookup_table_a(applicable_available_income_amount)
  # 3f. Adjustment for the number of children in 1f, from Table B
  child_count_adjustment_factor = lookup_table_b(number_of_children_eligible)
  # 3g. Combined support amount
  combined_support_amount = one_child_support_amount * child_count_adjustment_factor
